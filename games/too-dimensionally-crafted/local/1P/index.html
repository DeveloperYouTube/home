<!DOCTYPE html>
<html>
    <head>
        <title>Too Dimensionally Crafted: Single player world select</title>
        <link rel="stylesheet" href="../../too-dimensionally-crafted.css">
    </head>
    <body>
        <a href="../">BACK</a>
        <div class="screen" style="background-color: black;">
            <p>Worlds: </p>
            <div style="right: 0px; left: 0px;" id="world-displayer"></div>
            <a href="./create/">Create new world</a>
        </div>
        <script>
            const world_displayer = document.getElementById('world-displayer');
            let worldsSTR = localStorage.getItem('2DCsinglePworlds');
            
            if (!worldsSTR) {
                worldsSTR = '{}';
                localStorage.setItem('2DCsinglePworlds', '{}');
            }
            
            const worlds = JSON.parse(worldsSTR);
            const display = Object.keys(worlds);
            
            // Clear out any placeholder content safely
            world_displayer.innerHTML = '';
            
            display.forEach(name => {
                // 1. Create a true, separate button element object
                const btn = document.createElement('button');
                btn.id = name;
                
                // 2. Use innerHTML on the *isolated* button to format its internal labels neatly
                btn.innerHTML = `${name}<br><small>${worlds[name].difficulty} - ${worlds[name].game_mode}</small>`;
                
                // 3. Attach the click listener directly to this specific button object
                btn.addEventListener('click', function() {
                    const world = worlds[name]
                    world.name = name;
                    localStorage.setItem('2DCsinglePworld', JSON.stringify(worlds[name]));
                    
                    // Redirect smoothly into your gameplay canvas layer
                    window.location.href = './play/';
                });
                
                // 4. Safely drop an organizational line break and the new button into your display div
                world_displayer.appendChild(document.createElement('br'));
                world_displayer.appendChild(btn);
            });
        </script>
    </body>
</html>
