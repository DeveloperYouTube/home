<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Too Dimensionally Crafted: Single player world select</title>
    <link rel="stylesheet" href="../../too-dimensionally-crafted.css">
    <style>
        /* Local layout fixes to isolate your floating menu buttons */
        .ui-nav-overlay {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
        }

        /* Enforce retro theme matching your custom font configuration */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            text-align: center;
            font-size: 24px;
            color: white;
            padding: 8px 16px;
            border-width: 5px;
            border-style: outset;
            background-color: #808080;
            border-color: #c0c0c0 #404040 #404040 #c0c0c0;
            cursor: pointer;
            user-select: none;
        }

        .back-btn:active {
            border-style: inset;
            border-color: #404040 #c0c0c0 #c0c0c0 #404040;
            transform: translateY(2px);
        }

        /* Container setup to align buttons neatly down the page */
        #world-displayer {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            padding: 0 20px;
        }

        /* Style the world generation buttons dynamically */
        #world-displayer button {
            display: inline-block;
            width: max-content;            /* Shrink or expand perfectly to match text length */
            min-width: 300px;              /* Keeps short world names looking clean and consistent */
            max-width: 100%;               /* Caps size exactly at edge of browser window */
            white-space: nowrap;           /* Strictly prevents text from breaking downwards */
            overflow-x: auto;              /* Attaches a horizontal scrollbar if name exceeds page width */
            text-align: center;            /* Centers text alignments inside button walls */
            margin: 8px 0;
            padding: 10px 20px;
            cursor: pointer;
            box-sizing: border-box;
        }

        /* Clear out inline margins for smaller subtitle text lines */
        button br + small {
            font-size: 20px;
            opacity: 0.8;
            display: block;                /* Keeps subtitle centered directly below layout line break */
            text-align: center;
        }
    </style>
</head>
<body>

    <nav class="ui-nav-overlay">
        <a href="../" class="back-btn">BACK</a>
    </nav>

    <div class="screen" style="background-color: black;">
        <p>Worlds: </p>
        <div style="right: 0px; left: 0px;" id="world-displayer"></div>
        <a href="./create/">Create new world</a>
    </div>

    <script>
        const world_displayer = document.getElementById('world-displayer');
        let worldsSTR = localStorage.getItem('2DCsinglePworlds');
        
        if (!worldsSTR) {
            worldsSTR = '{}';
            localStorage.setItem('2DCsinglePworlds', '{}');
        }
        
        const worlds = JSON.parse(worldsSTR);
        const display = Object.keys(worlds);
        
        // Clear out any placeholder content safely
        world_displayer.innerHTML = '';
        
        display.forEach(name => {
            // 1. Create a true, separate button element object
            const btn = document.createElement('button');
            btn.id = name;
            
            // 2. Use innerHTML on the *isolated* button to format its internal labels neatly
            btn.innerHTML = `${name}<br><small>${worlds[name].difficulty} - ${worlds[name].game_mode}</small>`;
            
            // 3. Attach the click listener directly to this specific button object
            btn.addEventListener('click', function() {
                const world = worlds[name];
                world.name = name;
                localStorage.setItem('2DCsinglePworld', JSON.stringify(worlds[name]));
                
                // Redirect smoothly into your gameplay canvas layer
                window.location.href = './play/';
            });
            
            // 4. Safely drop the new button into your layout flex container
            world_displayer.appendChild(btn);
        });
    </script>
</body>
</html>
