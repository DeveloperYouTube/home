<!DOCTYPE html>
<html>
    <head>
        <title>Too Dimensionally Crafted: Single player world select</title>
        <link rel="stylesheet" href="../../too-dimensionally-crafted.css">
    </head>
    <body>
        <a href="../">BACK</a>
        <div class="screen" style="background-color: black;">
            <p>Worlds: </p>
            <div style="right: 0px; left: 0px;" id="world-displayer"></div>
            <a href="./create/">Create new world</a>
        </div>
        <script>
            const world_displayer = document.getElementById('world-displayer');
            let worldsSTR = localStorage.getItem('2DCsinglePworlds');
            let worlds;
            if (!worldsSTR) {
                worldsSTR = '{}'
                localStorage.setItem('2DCsinglePworlds', '{}');
            }
            worlds = JSON.parse(worldsSTR);
            let display = Object.keys(worlds);
            display.forEach(name => {
                world_displayer.innerHTML += `<br><button class="select" data-name="${name}">${name}<br>${worlds[name].difficulty} ${worlds[name].game_mode}</button>`;
            });
            
            world_displayer.addEventListener('click', function(event) {
                // Check if the clicked element (or its parent) is a select button
                const button = event.target.closest('.select');
                
                if (button) {
                    const name = button.dataset.name;
                    const worldData = worlds[name];

                    // Ensure the world data actually exists before moving on
                    if (worldData) {
                        // Include the name in the data object before saving
                        worldData.name = name; 
                        
                        localStorage.setItem('2DCsinglePworldJSON', JSON.stringify(worldData));
                        window.location.href = "./play/";
                    }
                }
            });
        </script>
    </body>
</html>
