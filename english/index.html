<!DOCTYPE html>
<html>
    <head>
        <title>English makes absolutly no sense at all!</title>

    <body>
        <p>I present a present present in the present</p>
        <p>I sent a scented cent</p>
        <p id="b">Click to generate buffalo text</p>
        <p id="f">Click to generate fish text</p>
        <script>
            const buffalo = document.getElementById("b");
            const fish = document.getElementById("f");

            buffalo.addEventListener('click', () => {
                buffalo.innerHTML = "Buffalo ";
                function streamBuffalo() {
                    buffalo.innerHTML += "buffalo ";
                    requestAnimationFrame(streamBuffalo);
                }
                requestAnimationFrame(streamBuffalo);
            });

            fish.addEventListener('click', () => {
                fish.innerHTML = "Fish ";
                function streamFish() {
                    fish.innerHTML += "fish ";
                    requestAnimationFrame(streamFish);
                }
                requestAnimationFrame(streamFish);
            });
        </script>
    </body>
