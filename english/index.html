<!DOCTYPE html>

<html>
    <head>
        <title>English makes absolutly no sense at all!</title>
    </head>
    <body>
        <p>I present a present present in the present</p>
        <p>I sent a scented cent</p>
        <p id="b">Click to generate buffalo text</p>
        <p id="f">Click to generate fish text</p>
        <script>
            const buffalo = document.getElementById("b");
            const fish = document.getElementById("f");
            let m = 0.000001;
            const pause = async (ms) => new Promise(resolve => setTimeout(resolve, ms));
            buffalo.addEventListener('click', async () => {
                buffalo.innerHTML = "Buffalo ";
                async function streamBuffalo() {
                    requestAnimationFrame(streamBuffalo);
                    for (i = 0; i<m; i++) {buffalo.innerHTML += "buffalo "; m++; await pause(5)}
                }
                requestAnimationFrame(streamBuffalo);
            });

            fish.addEventListener('click', async () => {
                fish.innerHTML = "Fish ";
                async function streamFish() {
                    requestAnimationFrame(streamFish);
                    for (i = 0; i<m; i++) {fish.innerHTML += "fish "; m++; await pause(5)}
                }
                requestAnimationFrame(streamFish);
            });
        </script>
    </body>
