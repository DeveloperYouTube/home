<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Player Console</title>
    <link rel="stylesheet" href="../../too-dimensionally-crafted.css">
    <style>
        /* Base page layout matching your homepage dashboard style */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-header {
            border-bottom: 2px solid #333333;
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-title {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* Return button layout matching standard navigation headers */
        .nav-link {
            display: inline-block;
            text-decoration: none;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 6px 14px;
            background: transparent;
            font-size: 14px;
            cursor: pointer;
        }

        .nav-link:hover {
            background: rgba(0, 255, 102, 0.1);
        }

        /* Centered grid column system optimized for the player console */
        .dashboard-content {
            display: grid;
            grid-template-columns: 1fr;
            max-width: 600px;
            margin: 0 auto;
        }

        .panel {
            background-color: #1a1a1a;
            border: 1px solid #333333;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel-title {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            color: #bbbbbb;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* Large control toggle switch styled for the dashboard */
        .control-btn {
            display: block;
            width: 100%;
            background-color: #222222;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            letter-spacing: 1px;
            transition: background-color 0.1s;
        }

        .control-btn:hover {
            background-color: rgba(0, 255, 102, 0.1);
        }

        .control-btn.active-stop {
            border-color: #ff3333;
            color: #ff3333;
        }

        .control-btn.active-stop:hover {
            background-color: rgba(255, 51, 51, 0.1);
        }

        /* Real-time metrics output logging terminal */
        .console-log {
            margin-top: 20px;
            background-color: #0b0b0b;
            border: 1px solid #222222;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
        }

        .log-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .log-row:last-child {
            margin-bottom: 0;
        }

        .log-label {
            color: #888888;
        }

        .log-value {
            color: #ffffff;
        }

        .log-value.highlight {
            color: #00ff66;
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <h1 class="dashboard-title">TRACK_PLAYER_CONSOLE //</h1>
        <a href="../" class="nav-link">RETURN_TO_HUB</a>
    </header>

    <main class="dashboard-content">
        
        <section class="panel">
            <h2 class="panel-title">SEQUENCE_CONTROLLER</h2>
            
            <!-- Dynamic Audio Elements -->
            <audio id="primary-loop" src="../../../music/boss/1/4824602425032704.wav" loop></audio>
            <audio id="outro-track" src="../../../music/boss/1/6026566471122944.wav"></audio>

            <!-- Main Interactive Switch -->
            <button id="sequence-trigger" class="control-btn">INITIALIZE_SEQUENCE</button>

            <!-- Real-time Status Console -->
            <div class="console-log">
                <div class="log-row">
                    <span class="log-label">playback_state:</span>
                    <span id="log-state" class="log-value">IDLE</span>
                </div>
                <div class="log-row">
                    <span class="log-label">current_time:</span>
                    <span id="log-time" class="log-value">0.00s</span>
                </div>
                <div class="log-row">
                    <span class="log-label">active_section:</span>
                    <span id="log-section" class="log-value">--</span>
                </div>
                <div class="log-row">
                    <span class="log-label">calculated_note:</span>
                    <span id="log-note" class="log-value">--</span>
                </div>
                <div class="log-row">
                    <span class="log-label">transition_node:</span>
                    <span id="log-routing" class="log-value highlight">READY</span>
                </div>
            </div>
        </section>

    </main>

    <script type="module">
        const mainLoop = document.getElementById('primary-loop');
        const outroTrack = document.getElementById('outro-track');
        const triggerBtn = document.getElementById('sequence-trigger');
        
        // Console fields
        const logState = document.getElementById('log-state');
        const logTime = document.getElementById('log-time');
        const logSection = document.getElementById('log-section');
        const logNote = document.getElementById('log-note');
        const logRouting = document.getElementById('log-routing');

        // Timing constants
        const NOTES_PER_SECOND = 6;
        const NOTE_DURATION = 1 / NOTES_PER_SECOND; // ~0.166667s
        const NOTES_PER_SECTION = 31;
        const SECTION_DURATION = NOTES_PER_SECTION * NOTE_DURATION; // ~5.166667s

        let isPlaying = false;
        let updateInterval = null;

        triggerBtn.addEventListener('click', () => {
            if (!isPlaying) {
                mainLoop.play();
                outroTrack.pause();
                outroTrack.currentTime = 0;
                
                triggerBtn.innerText = "TRIGGER_TRANSITION_OUTRO";
                triggerBtn.classList.add('active-stop');
                logState.innerText = "MAIN_LOOP_RUNNING";
                isPlaying = true;

                // Fire up a real-time monitor loop for the console readouts
                updateInterval = setInterval(monitorPlayback, 50);
            } else {
                handleTrackTransition();
            }
        });

        function monitorPlayback() {
            const time = mainLoop.currentTime;
            logTime.innerText = `${time.toFixed(2)}s`;

            const currentSection = Math.floor(time / SECTION_DURATION) % 4;
            const timeInSection = time % SECTION_DURATION;
            const currentNote = Math.floor(timeInSection / NOTE_DURATION) + 1;

            logSection.innerText = `SECTION_${currentSection + 1}`;
            logNote.innerText = `NOTE_${currentNote > 31 ? 31 : currentNote}`;
        }

        function handleTrackTransition() {
            clearInterval(updateInterval);
            const stopTime = mainLoop.currentTime;
            mainLoop.pause();

            const currentSection = Math.floor(stopTime / SECTION_DURATION) % 4;
            const timeInSection = stopTime % SECTION_DURATION;
            let currentNote = Math.floor(timeInSection / NOTE_DURATION) + 1;

            // Handle the missing download truncated note in section 4
            if (currentSection === 3 && currentNote > 30) {
                currentNote = 30;
            }

            let targetStartTime = 0;
            const note7Time = 6 * NOTE_DURATION;
            const note10Time = 9 * NOTE_DURATION;

            // Decision Engine Routing
            if (currentNote <= 10) {
                targetStartTime = note7Time + timeInSection;
                logRouting.innerText = `EARLY_WINDOW (SEC_${currentSection + 1} / NOTE_${currentNote})`;
            } 
            else if (currentNote > (NOTES_PER_SECTION - 15)) {
                targetStartTime = note7Time + timeInSection;
                logRouting.innerText = `LATE_WINDOW (SEC_${currentSection + 1} / NOTE_${currentNote})`;
            } 
            else {
                targetStartTime = timeInSection - note10Time;
                logRouting.innerText = `MID_WINDOW (SEC_${currentSection + 1} / NOTE_${currentNote})`;
            }

            // Sync and execute outro
            outroTrack.currentTime = Math.max(0, targetStartTime);
            outroTrack.play();

            // Reset UI States
            logState.innerText = "OUTRO_PHASE_ACTIVE";
            logSection.innerText = "--";
            logNote.innerText = "--";
            triggerBtn.innerText = "INITIALIZE_SEQUENCE";
            triggerBtn.classList.remove('active-stop');
            isPlaying = false;
        }
    </script>
</body>
</html>
