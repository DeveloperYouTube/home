<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PLAYER_CONSOLE</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .console-box { width: 300px; border: 1px solid #333; padding: 20px; margin-top: 50px; }
        .log { font-size: 12px; color: #666; margin-top: 20px; border-top: 1px solid #222; padding-top: 10px; }
        button { background: transparent; border: 1px solid #fff; color: #fff; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; }
        button:hover { background: #fff; color: #000; }
        .active { border-color: #f00; color: #f00; }
    </style>
</head>
<body>
    <div class="console-box">
        <div id="status">READY</div>
        <button id="trigger">EXECUTE_SEQUENCE</button>
        <div class="log" id="log">SYS_INIT_COMPLETE</div>
    </div>

    <audio id="main" src="../../../music/boss/1/4824602425032704.wav" loop></audio>
    <audio id="outro" src="../../../music/boss/1/6026566471122944.wav"></audio>

    <script>
        const main = document.getElementById('main');
        const outro = document.getElementById('outro');
        const trigger = document.getElementById('trigger');
        const log = document.getElementById('log');
        
        let active = false;
        const NPS = 6;
        const SEC_DUR = 31 / NPS;

        trigger.onclick = () => {
            if (!active) {
                main.play();
                trigger.innerText = "TRIGGER_OUTRO";
                trigger.classList.add('active');
                active = true;
                log.innerText = "SEQ_ACTIVE // MONITORING";
            } else {
                handleTransition();
            }
        };

        function handleTransition() {
            const stopTime = main.currentTime;
            main.pause();
            const sec = Math.floor(stopTime / SEC_DUR) % 4;
            const timeIn = stopTime % SEC_DUR;
            const note = Math.floor(timeIn / (1/NPS)) + 1;
            
            // Logic rules
            let target = (note <= 10 || note > 16) ? (6/NPS + timeIn) : (timeIn - 9/NPS);
            
            outro.currentTime = Math.max(0, target);
            outro.play();
            
            trigger.innerText = "EXECUTE_SEQUENCE";
            trigger.classList.remove('active');
            active = false;
            log.innerText = `OUTRO_TRIGGERED // SEC:${sec} NOTE:${note}`;
        }
    </script>
</body>
</html>
