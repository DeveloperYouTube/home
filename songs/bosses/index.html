<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Too Dimensionally Crafted: Boss Music Hub</title>
    <link rel="stylesheet" href="../../too-dimensionally-crafted.css">
    <style>
        /* Local layout fixes to isolate your floating menu buttons */
        .ui-nav-overlay {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
        }

        /* Enforce retro theme matching your custom font configuration */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            text-align: center;
            font-size: 24px;
            color: white;
            padding: 8px 16px;
            border-width: 5px;
            border-style: outset;
            background-color: #808080;
            border-color: #c0c0c0 #404040 #404040 #c0c0c0;
            cursor: pointer;
            user-select: none;
        }

        .back-btn:active {
            border-style: inset;
            border-color: #404040 #c0c0c0 #c0c0c0 #404040;
            transform: translateY(2px);
        }

        /* Container scales to match the single widest button layout inside it */
        #boss-displayer {
            display: grid;
            grid-template-columns: 1fr;
            width: max-content;
            min-width: 400px;              /* Base size so names look substantial */
            max-width: 100vw;              /* Prevents sizing past the active screen edge */
            margin: 0 auto;                /* Centers the entire list group on the screen */
            box-sizing: border-box;
            padding: 0 20px;
        }

        /* Style the boss selector links to look like uniform menu buttons */
        #boss-displayer .boss-link-btn {
            display: inline-block;
            width: 100%;                   /* All buttons expand to match the shared column width */
            text-decoration: none;
            font-size: 24px;
            color: white;
            padding: 12px 24px;
            margin: 8px 0;
            border-width: 5px;
            border-style: outset;
            background-color: #4a1212;     /* Dark reddish crimson for a boss theme tint */
            border-color: #8b2525 #240808 #240808 #8b2525;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;           /* Strictly prevents text from breaking downwards */
            overflow-x: auto;              /* Attaches a horizontal scrollbar if name exceeds page width */
            text-align: center;            /* Centers text alignments inside button walls */
            box-sizing: border-box;
        }

        #boss-displayer .boss-link-btn:active {
            border-style: inset;
            border-color: #240808 #8b2525 #8b2525 #240808;
            transform: translateY(2px);
        }

        /* Clear out inline margins for smaller subtitle text lines */
        .boss-link-btn br + small {
            font-size: 18px;
            opacity: 0.8;
            display: block;                /* Keeps subtitle centered directly below layout line break */
            text-align: center;
            color: #ffcccc;
        }
    </style>
</head>
<body>

    <nav class="ui-nav-overlay">
        <!-- Adjust this path to match wherever your main game options menu lives -->
        <a href="../" class="back-btn">BACK</a>
    </nav>

    <div class="screen" style="background-color: black;">
        <p style="color: #ff3333; text-shadow: 2px 2px #000000;">BOSS MUSIC ARCHIVE</p>
        
        <!-- The shared container where all boss options are built identically wide -->
        <div id="boss-displayer"></div>
    </div>

    <script type="module">
        const boss_displayer = document.getElementById('boss-displayer');

        // Centralized data table for your boss themes.
        // Add new themes here and the page updates automatically with identical button widths!
        const bossTracks = [
            {
                name: "First one made",
                type: "Dynamic 2-Track System",
                folderPath: "./1/"
            }
        ];

        // Clear out any structural text securely
        boss_displayer.innerHTML = '';

        bossTracks.forEach(boss => {
            // 1. Create the anchor block styled to act exactly like an interactive button
            const linkBtn = document.createElement('a');
            linkBtn.className = 'boss-link-btn';
            linkBtn.href = boss.folderPath;
            
            // 2. Format internal dynamic label rows neatly
            linkBtn.innerHTML = `${boss.name}<br><small>${boss.type}</small>`;
            
            // 3. Drop clean element onto the screen grid
            boss_displayer.appendChild(linkBtn);
        });
    </script>
</body>
</html>
