<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Audio Loop Engine</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #0b0c10;
            --accent-green: #39ff14;
            --accent-red: #ff073a;
            --text-main: #00c000;
            --text-muted: #006600;
            --border-color: #003300;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            padding: 20px;
        }

        /* Top navigation layout wrapper for your escape route link button */
        .top-nav {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        /* Consistent raw monospace button profile design matches other utilities */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            font-family: 'Roboto Mono', monospace;
            font-size: 16px;
            font-weight: bold;
            color: white;
            padding: 8px 16px;
            border-width: 5px;
            border-style: outset;
            background-color: #808080;
            border-color: #c0c0c0 #404040 #404040 #c0c0c0;
            cursor: pointer;
        }

        .back-btn:active {
            border-style: inset;
            border-color: #404040 #c0c0c0 #c0c0c0 #404040;
            transform: translateY(2px);
        }

        /* Centered Media Deck Card container panel */
        .audio-card {
            background: var(--panel-bg);
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 20px;
            font-weight: 500;
            margin: 0 0 24px 0;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        button {
            flex: 1;
            border: none;
            padding: 14px 20px;
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #playBtn {
            background: var(--accent-green);
            color: #000;
        }

        #playBtn:hover:not(:disabled) {
            background: #2ee610;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }

        #stopBtn {
            background: var(--accent-red);
            color: #fff;
        }

        #stopBtn:hover:not(:disabled) {
            background: #e00633;
            box-shadow: 0 0 15px rgba(255, 7, 58, 0.3);
        }

        button:disabled {
            background: #14161d !important;
            color: var(--text-muted) !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="../" class="back-btn">BACK</a>
    </nav>

    <div class="audio-card">
        <h1>E and F only + chords</h1>

        <div class="btn-group">
            <button id="playBtn" onclick="startTrack()">Play Track</button>
            <button id="stopBtn" onclick="triggerOutro()" disabled>Cut to Outro</button>
        </div>
    </div>

    <script>
        const intro = new Audio('../../music/e f/intro.wav');
        const middle = new Audio('../../music/e f/mid.wav');
        const outro = new Audio('../../music/e f/outro.wav');

        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');

        middle.loop = true;

        function resetEngine() {
            playBtn.disabled = false;
            stopBtn.disabled = true;
            intro.currentTime = 0;
            middle.currentTime = 0;
            outro.currentTime = 0;
        }

        function startTrack() {
            playBtn.disabled = true;
            stopBtn.disabled = false;

            intro.currentTime = 0;
            intro.play();

            intro.onended = () => {
                middle.currentTime = 0;
                middle.play();
            };
        }

        function triggerOutro() {
            stopBtn.disabled = true;
            let targetOutroTime = 0;

            if (!intro.paused) {
                const elapsedIntro = intro.currentTime;
                intro.pause();

                if (elapsedIntro <= 12) {
                    targetOutroTime = 12 - elapsedIntro;
                } else {
                    const fakeMiddleTime = elapsedIntro - 12; 
                    targetOutroTime = fakeMiddleTime % 4; 
                }
            } else if (!middle.paused) {
                const elapsedMiddle = middle.currentTime;
                middle.pause();
                
                targetOutroTime = elapsedMiddle % 4;
            }

            outro.currentTime = targetOutroTime;
            outro.play();

            outro.onended = () => {
                resetEngine();
            };
        }
    </script>
</body>
</html>
