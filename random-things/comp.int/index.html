<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Calculator</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }

        .calc-container {
            display: flex;
            flex-direction: column;
            width: max-content;
            min-width: 320px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ffffff;
            box-sizing: border-box;
        }

        label {
            font-size: 18px;
            margin-top: 12px;
            margin-bottom: 4px;
        }

        input {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 18px;
            box-sizing: border-box;
            width: 100%;
        }

        input:focus {
            outline: none;
            background-color: #111111;
        }

        .results {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px dashed #ffffff;
        }

        p {
            font-size: 20px;
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="calc-container">
        <label for="m">Money ($):</label>
        <input type="number" id="m" name="m" placeholder="1000">

        <label for="i">Interest (%/year):</label>
        <input type="number" id="i" name="i" placeholder="5">

        <label for="y">Time (years):</label>
        <input type="number" id="y" name="y" placeholder="1">

        <div class="results">
            <p id="g">Gain: $0.00</p>
            <p id="t">Total: $0.00</p>
        </div>
    </div>

    <script>
        const g = document.getElementById('g');
        const t = document.getElementById('t');
        const m = document.getElementById('m');
        const i = document.getElementById('i');
        const y = document.getElementById('y');

        function calculate() {
            const principal = parseFloat(m.value) || 0;
            const rate = (parseFloat(i.value) || 0) / 100;
            const years = parseFloat(y.value) || 0;

            // Compound interest: Interest compounds into the principal each year
            const total = principal * Math.pow(1 + rate, years);
            const gain = total - principal;

            g.innerText = `Gain: $${gain.toFixed(2)}`;
            t.innerText = `Total: $${total.toFixed(2)}`;
        }

        m.addEventListener('input', calculate);
        i.addEventListener('input', calculate);
        y.addEventListener('input', calculate);
    </script>
</body>
</html>
