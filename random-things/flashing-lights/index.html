<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashing Lights</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Dark glass panel backdrop to make the green text highly visible over the static */
        .ui-overlay {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.85); 
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid #003300;
            box-shadow: 0 4px 20px rgba(0,0,0,0.9);
        }

        /* Clean Terminal-style Back link */
        .back-btn {
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: #00c000;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .back-btn:hover {
            color: #39ff14; /* Glow highlight */
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <a href="../" class="back-btn">&larr; BACK</a>
    </div>

    <canvas id="glitchCanvas"></canvas>

    <script>
        const canvas = document.getElementById('glitchCanvas');
        const context = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth / 4;
            canvas.height = window.innerHeight / 4;
        }
        window.addEventListener('resize', resize);
        resize();

        function loop() {
            const imgData = context.createImageData(canvas.width, canvas.height);
            const data = imgData.data;
            const len = data.length;

            for (let i = 0; i < len; i += 4) {
                data[i]     = Math.random() * 255;
                data[i + 1] = Math.random() * 255;
                data[i + 2] = Math.random() * 255;
                data[i + 3] = 255;
            }

            context.putImageData(imgData, 0, 0);
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
