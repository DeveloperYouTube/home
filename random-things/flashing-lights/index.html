<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashing Lights</title>
    <style>
        /* Inherit your custom font styling */
        @font-face {
            font-family: 'simplistic-pixelation-sans-mono';
            src: url('../../fonts/simplistic-pixelation-sans-mono.woff2') format('woff2');
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            overflow: hidden;
        }

        /* Set canvas to occupy the full screen viewport layout cleanly */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Floating UI layer container sitting above the flashing canvas element */
        .ui-overlay {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10;
        }

        /* Your signature classic grey 3D game buttons */
        .back-btn {
            display: inline-block;
            text-decoration: none;
            text-align: center;
            font-family: 'simplistic-pixelation-sans-mono', monospace;
            font-size: 24px;
            color: white;
            padding: 8px 16px;
            border-width: 5px;
            border-style: outset;
            background-color: #808080;
            border-color: #c0c0c0 #404040 #404040 #c0c0c0;
            cursor: pointer;
            user-select: none;
        }

        .back-btn:active {
            border-style: inset;
            border-color: #404040 #c0c0c0 #c0c0c0 #404040;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <a href="../" class="back-btn">BACK</a>
    </div>

    <canvas id="glitchCanvas"></canvas>

    <script>
        const canvas = document.getElementById('glitchCanvas');
        const context = canvas.getContext('2d');

        // Dynamically scale the canvas viewport internal resolution 
        function resize() {
            // Keep internal resolution low (e.g., divided by 4) to boost performance and 
            // make the pixel blocks look larger, cooler, and more vintage retro!
            canvas.width = window.innerWidth / 4;
            canvas.height = window.innerHeight / 4;
        }
        window.addEventListener('resize', resize);
        resize();

        // Optimized noise generation loop using direct ImageData modulation
        function loop() {
            const imgData = context.createImageData(canvas.width, canvas.height);
            const data = imgData.data;
            const len = data.length;

            for (let i = 0; i < len; i += 4) {
                data[i]     = Math.random() * 255; // Red
                data[i + 1] = Math.random() * 255; // Green
                data[i + 2] = Math.random() * 255; // Blue
                data[i + 3] = 255;                 // Alpha opacity (fully visible)
            }

            context.putImageData(imgData, 0, 0);
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
