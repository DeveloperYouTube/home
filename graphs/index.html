<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmos Graphs</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0b0c10;
            --text-main: #00c000;
            --text-muted: #006600;
            --accent-glow: #39ff14;
            --border-color: #003300;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        /* Nav & Header */
        .top-nav {
            margin-bottom: 2.5rem;
            align-self: flex-start;
            width: 100%;
        }

        .back-btn {
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        .page-header {
            margin-bottom: 2.5rem;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 1rem;
        }

        .page-header h1 {
            font-size: 1.75rem;
        }

        .page-header .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Responsive Embed Grid Layout */
        .embed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2rem;
        }

        @media (max-width: 500px) {
            .embed-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Individual Content Windows */
        .embed-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .embed-card h2 {
            font-size: 1.1rem;
            color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        /* Responsive Wrapper to preserve 16:9 aspect ratio scales perfectly */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background: #020602;
            border-radius: 4px;
            border: 1px dashed var(--text-muted);
        }

        /* Forces any iframe dropped here to fill the container window */
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <main class="container">
        <nav class="top-nav">
            <a href="../" class="back-btn">&larr; BACK</a>
        </nav>

        <header class="page-header">
            <h1>Graphs</h1>
            <p class="subtitle">// Interactive graphs made with Desmos</p>
        </header>

        <section class="embed-grid">

            <!-- MODULE 1: VIDEO OR GAME SLOT -->
            <div class="embed-card">
                <h2>Trigonometry with unit circle</h2>
                <div class="iframe-container">
                    
                    <iframe src="https://www.desmos.com/calculator/q3vrltvbq5?embed" width="500" height="500" style="border: 1px solid #ccc" frameborder=0></iframe>

                </div>
            </div>
        </section>
    </main>

</body>
</html>
